<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ХОЛЛ 6 — ВАСИЛИЙ ЮД — ВСЕ</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
}

body {
    background: url("hall6.jpg") center center / cover no-repeat;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(0,0,0,0) 35%, rgba(0,0,0,0.82) 100%);
    pointer-events: none;
}

.title {
    position: absolute;
    top: 7%;
    left: 50%;
    transform: translateX(-50%);
    color: #f3c27a;
    font-size: clamp(24px, 3vw, 48px);
    letter-spacing: 0.08em;
    text-shadow: 0 0 16px rgba(255, 180, 80, 0.65);
    z-index: 2;
    text-align: center;
    white-space: nowrap;
}

.portal {
    position: absolute;
    left: 50%;
    bottom: 16%;
    transform: translateX(-50%);
    width: min(28vw, 260px);
    height: min(18vh, 140px);
    cursor: pointer;
    z-index: 3;
}

.portal::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(255,195,120,0.40) 0%, rgba(255,195,120,0.12) 45%, rgba(255,195,120,0) 75%);
    animation: pulse 2.8s ease-in-out infinite;
    border-radius: 50%;
}

.portal::after {
    content: "";
    position: absolute;
    inset: 18% 24%;
    border-radius: 50%;
    box-shadow:
        0 0 18px rgba(255, 208, 120, 0.7),
        0 0 38px rgba(255, 180, 70, 0.45),
        inset 0 0 12px rgba(255, 235, 190, 0.25);
    background: radial-gradient(circle, rgba(255,240,210,0.35), rgba(255,170,60,0.08), rgba(255,160,60,0));
}

@keyframes pulse {
    0%, 100% { opacity: 0.35; transform: scale(0.96); }
    50% { opacity: 0.9; transform: scale(1.05); }
}
</style>
</head>
<body>

<div class="title"></div>

<div class="portal" onclick="location.href='gallery6.html'" title="Войти в галерею"></div>

</body>
</html>
