<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Логово</title>

<style>
@font-face {
    font-family: '1713';
    src: url('fonts1713.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* Фон-картина */
#scene {
    position: absolute;
    inset: 0;
    background: url("logovo.jpg") center/cover no-repeat;
}

/* Активная зона огненного пятна */
#fire-zone {
    position: absolute;
    left: 50%;
    top: 58%;
    transform: translate(-50%, -50%);
    width: 150px;
    height: 150px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 20;

    /* Для отладки можно временно включить:
    background: rgba(255, 80, 0, 0.18);
    box-shadow: 0 0 25px rgba(255,120,0,0.25);
    */
}

/* Номер портала внизу */
#portal-number {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    min-width: 120px;
    text-align: center;

    font-family: '1713', serif;
    font-size: 54px;
    font-weight: bold;
    letter-spacing: 3px;
    color: rgba(230, 235, 240, 0.95);

    opacity: 0;
    transition: opacity 0.8s ease, transform 0.8s ease;
    z-index: 40;
    pointer-events: none;

    text-shadow:
        0 0 6px rgba(180, 200, 220, 0.18),
        0 0 18px rgba(120, 150, 180, 0.12);
}

#portal-number.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* Афоризм */
#aphorism {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translate(-50%, 0);

    width: 88%;
    text-align: center;

    font-family: '1713', serif;
    font-size: 50px;
    font-weight: bold;
    line-height: 1.25;
    letter-spacing: 2px;

    color: #ffb347;
    text-shadow: 0 0 8px rgba(255, 160, 60, 0.5);
    opacity: 0;

    z-index: 50;
    pointer-events: none;

    transition: opacity 2.5s ease;
}

#aphorism.show {
    opacity: 1;
}

#aphorism.fadeout {
    opacity: 0;
}

.fadeout {
    color: rgba(210, 225, 225, 0);
    text-shadow: none;
}

.white-word {
    color: #ffffff;
}
</style>
</head>

<body>

<div id="scene"></div>

<div id="fire-zone" aria-label="Открыть портал"></div>

<div id="portal-number"></div>

<div id="aphorism">
    ИНОГДА НЕ ТУДА — ЭТО ЕДИНСТВЕННОЕ МЕСТО, ГДЕ <span class="white-word">ТУДА</span>
</div>

<script>
const fireZone = document.getElementById("fire-zone");
const text = document.getElementById("aphorism");
const portalNumber = document.getElementById("portal-number");

let spinning = false;

fireZone.onclick = () => {
    if (spinning) return;
    spinning = true;

    text.classList.remove("show", "fadeout");
    portalNumber.classList.remove("show");

    const direction = Math.floor(Math.random() * 25) + 1;

    portalNumber.textContent = direction;
    portalNumber.classList.add("show");

    setTimeout(() => {
        text.classList.add("show");

        setTimeout(() => {
            text.classList.add("fadeout");

            setTimeout(() => {
                window.location.href = "hall" + direction + ".html";
            }, 2200);

        }, 3200);

    }, 700);
};
</script>

</body>
</html>
