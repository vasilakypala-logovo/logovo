<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>СВЯЗЬ НЕКСА</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Georgia,"Times New Roman",serif;
  color:#eaf2f7;

  background:
    radial-gradient(circle at 14% 10%,rgba(110,170,210,.18),transparent 30%),
    radial-gradient(circle at 86% 78%,rgba(210,230,240,.10),transparent 34%),
    linear-gradient(135deg,#071018,#162632 55%,#080d12);
}

header{
  padding:22px;
  background:rgba(0,0,0,.32);
  border-bottom:1px solid rgba(255,255,255,.14);
  box-shadow:0 5px 22px rgba(0,0,0,.45);
  text-align:center;
}

.logo{
  font-size:54px;
  margin-bottom:6px;
  filter:drop-shadow(0 0 10px rgba(180,220,255,.25));
}

h1{
  margin:0;
  font-size:30px;
  letter-spacing:2px;
  color:#d8edf7;
  text-shadow:0 2px 12px #000;
}

.sub{
  margin-top:6px;
  color:#9fb5c2;
  font-size:14px;
}

.wrap{
  max-width:1300px;
  margin:auto;
  padding:18px;
}

.panel{
  background:linear-gradient(180deg,rgba(31,48,60,.94),rgba(13,20,27,.96));

  border:1px solid rgba(255,255,255,.14);
  border-radius:20px;

  box-shadow:
    0 14px 34px rgba(0,0,0,.38),
    inset 0 1px 0 rgba(255,255,255,.04);

  padding:18px;
}

.form{
  display:grid;
  grid-template-columns:1fr 1fr auto;
  gap:10px;
  margin-bottom:18px;
}

input{
  width:100%;
  padding:11px;

  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);

  background:#091018;
  color:#eaf2f7;

  font:inherit;

  box-shadow:inset 0 1px 5px rgba(0,0,0,.45);
}

input:focus{
  outline:none;

  border-color:rgba(170,215,240,.55);

  box-shadow:
    0 0 12px rgba(110,190,230,.20),
    inset 0 1px 5px rgba(0,0,0,.45);
}

button{
  border:1px solid rgba(255,255,255,.16);
  border-radius:12px;

  padding:10px 14px;

  font:bold 14px Georgia,"Times New Roman",serif;

  cursor:pointer;

  background:linear-gradient(180deg,#d6edf7,#7ea9bd);

  color:#081018;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.55),
    0 4px 12px rgba(0,0,0,.35);
}

button:hover{
  filter:brightness(1.08);
}

button:active{
  transform:translateY(1px);
}

.danger{
  background:linear-gradient(180deg,#8e4545,#5a2020);
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
}

.card{
  background:linear-gradient(160deg,rgba(42,68,82,.98),rgba(12,18,24,.98));

  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;

  padding:12px;

  display:flex;
  flex-direction:column;
  gap:10px;

  min-height:110px;

  box-shadow:
    0 8px 18px rgba(0,0,0,.34),
    inset 0 1px 0 rgba(255,255,255,.04);
}

.siteName{
  font-size:17px;
  font-weight:bold;
  color:#effaff;
  text-align:center;
  word-break:break-word;

  flex:1;

  display:flex;
  align-items:center;
  justify-content:center;
}

.btns{
  display:flex;
  gap:8px;
}

.btns button{
  flex:1;
  font-size:12px;
  padding:7px 8px;
}

.empty{
  text-align:center;
  color:#91a9b6;
  padding:70px 20px;
  font-size:18px;

  border:1px dashed rgba(255,255,255,.16);
  border-radius:18px;

  background:rgba(255,255,255,.02);
}

.stat{
  color:#9fb5c2;
  margin-bottom:14px;
  text-align:center;
}

#error{
  display:none;

  margin:12px auto;
  max-width:1000px;

  padding:10px;

  border-radius:12px;

  background:#5f2a2a;
  color:white;
}

@media(max-width:760px){

  .form{
    grid-template-columns:1fr;
  }

}
</style>
</head>

<body>

<header>
  <div class="logo">🦇</div>
  <h1>СВЯЗЬ НЕКСА</h1>
  <div class="sub">
    Панель переходов и интернет-связей
  </div>
</header>

<div id="error"></div>

<div class="wrap">

  <div class="panel">

    <div class="form">

      <input id="nameInput" placeholder="Имя портала">

      <input id="urlInput" placeholder="https://...">

      <button id="addBtn">ДОБАВИТЬ</button>

    </div>

    <div class="stat" id="stat">Связей: 0</div>

    <div id="grid" class="grid"></div>

  </div>

</div>

<script>
(function(){

var KEY = "nex_connection_clean_v1";

var links = [];

function byId(id){
  return document.getElementById(id);
}

function showError(text){

  var box = byId("error");

  box.style.display = "block";

  box.textContent = text;
}

function esc(s){

  return String(s || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function normalizeUrl(url){

  url = String(url || "").trim();

  if(!url){
    return "";
  }

  if(!/^https?:\/\//i.test(url)){
    url = "https://" + url;
  }

  return url;
}

function save(){

  try{
    localStorage.setItem(KEY, JSON.stringify(links));
  }
  catch(e){
    showError("Не удалось сохранить связи.");
  }
}

function load(){

  try{
    links = JSON.parse(localStorage.getItem(KEY) || "[]");
  }
  catch(e){
    links = [];
  }
}

function render(){

  byId("stat").textContent = "Связей: " + links.length;

  if(!links.length){

    byId("grid").innerHTML =
      '<div class="empty">Порталы пока пусты</div>';

    return;
  }

  var html = "";

  links.forEach(function(x){

    html += '<article class="card">';

    html += '<div class="siteName">' + esc(x.name) + '</div>';

    html += '<div class="btns">';

    html += '<button onclick="openLink(\'' + x.id + '\')">ОТКРЫТЬ</button>';

    html += '<button class="danger" onclick="deleteLink(\'' + x.id + '\')">УДАЛИТЬ</button>';

    html += '</div>';

    html += '</article>';

  });

  byId("grid").innerHTML = html;
}

window.openLink = function(id){

  var x = links.find(function(i){
    return i.id === id;
  });

  if(!x){
    return;
  }

  window.open(x.url, "_blank");
};

window.deleteLink = function(id){

  var x = links.find(function(i){
    return i.id === id;
  });

  if(!x){
    return;
  }

  if(confirm("Удалить портал: " + x.name + "?")){

    links = links.filter(function(i){
      return i.id !== id;
    });

    save();

    render();
  }
};

byId("addBtn").onclick = function(){

  var name =
    byId("nameInput").value.trim();

  var url =
    normalizeUrl(
      byId("urlInput").value
    );

  if(!name){

    alert("Введите имя портала.");

    return;
  }

  if(!url){

    alert("Введите ссылку.");

    return;
  }

  links.unshift({

    id:
      String(Date.now()) + "_" +
      Math.random().toString(16).slice(2),

    name:name,
    url:url
  });

  save();

  byId("nameInput").value = "";
  byId("urlInput").value = "";

  render();
};

load();
render();

})();
</script>

</body>
</html>
