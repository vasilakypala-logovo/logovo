<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЗАЛ УТРЕННЕГО ЛЕТА</title>
<style>
:root{--sky1:#dff6ff;--sky2:#bfeaff;--sky3:#97d8ee;}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Georgia,"Times New Roman",serif;background:radial-gradient(circle at 45% 16%,rgba(255,255,255,.85),rgba(255,255,255,0) 35%),radial-gradient(circle at 12% 72%,rgba(225,250,255,.55),rgba(225,250,255,0) 30%),radial-gradient(circle at 80% 78%,rgba(185,235,250,.45),rgba(185,235,250,0) 34%),linear-gradient(135deg,var(--sky1),var(--sky2),var(--sky3));color:#2e7185}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 22% 35%,rgba(255,255,255,.24),rgba(255,255,255,0) 24%),radial-gradient(circle at 76% 30%,rgba(255,255,255,.18),rgba(255,255,255,0) 26%),linear-gradient(to bottom,rgba(255,255,255,.18),rgba(255,255,255,0) 45%,rgba(115,190,215,.14))}.title{position:fixed;top:3vh;width:100%;text-align:center;font-size:clamp(24px,3.2vw,43px);letter-spacing:clamp(3px,.7vw,9px);color:rgba(38,126,151,.82);text-shadow:0 1px 0 rgba(255,255,255,.88),0 0 28px rgba(255,255,255,.62);z-index:10;pointer-events:none}.stage{position:absolute;inset:10vh 2.5vw 5vh 2.5vw;display:flex;align-items:center;justify-content:center;gap:2.2vw}.picture-zone{height:100%;flex:1 1 auto;display:flex;align-items:center;justify-content:center;min-width:0}.frame{position:relative;display:inline-flex;align-items:center;justify-content:center;max-width:calc(100vw - 360px);max-height:78vh;padding:22px;border-radius:16px;background:linear-gradient(135deg,rgba(225,255,255,.98),rgba(92,224,236,.88) 28%,rgba(26,137,165,.86) 50%,rgba(140,246,255,.92) 72%,rgba(25,112,145,.9)),repeating-linear-gradient(55deg,rgba(255,255,255,.26) 0 4px,rgba(0,90,115,.12) 4px 9px);box-shadow:0 26px 66px rgba(20,112,142,.26),inset 0 0 0 2px rgba(255,255,255,.70),inset 0 0 0 8px rgba(20,118,145,.18),inset 0 0 24px rgba(0,70,95,.22)}.frame:before{content:"";position:absolute;inset:8px;border-radius:12px;border:2px ridge rgba(230,255,255,.9);pointer-events:none}.frame:after{content:"";position:absolute;inset:15px;border-radius:8px;border:2px groove rgba(12,112,142,.46);pointer-events:none}.artwrap{position:relative;background:rgba(255,255,255,.34);box-shadow:inset 0 0 20px rgba(0,80,110,.18);z-index:1}#mainImage{display:block;max-width:calc(100vw - 420px);max-height:calc(78vh - 44px);width:auto;height:auto;object-fit:contain;user-select:none;-webkit-user-drag:none;cursor:zoom-in;background:rgba(255,255,255,.4)}.side-plate{width:280px;min-height:310px;max-height:76vh;padding:18px 16px;border-radius:18px;background:linear-gradient(145deg,rgba(255,255,255,.70),rgba(225,255,255,.38) 42%,rgba(156,230,245,.28)),radial-gradient(circle at 20% 10%,rgba(255,255,255,.78),rgba(255,255,255,0) 34%);backdrop-filter:blur(8px);box-shadow:0 18px 44px rgba(20,100,130,.20),inset 0 0 0 1px rgba(255,255,255,.78),inset 0 0 24px rgba(255,255,255,.32)}#caption{width:100%;height:170px;resize:vertical;border:1px solid rgba(80,160,180,.32);border-radius:10px;padding:10px;background:rgba(255,255,255,.42);color:#2b6675;font-family:Georgia,"Times New Roman",serif;font-size:16px;line-height:1.35;outline:none}.controls{margin-top:13px;display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:none;border-radius:10px;padding:10px 8px;cursor:pointer;font-family:Georgia,"Times New Roman",serif;color:#286b7a;background:linear-gradient(145deg,rgba(255,255,255,.95),rgba(170,235,246,.68));box-shadow:0 4px 10px rgba(30,100,120,.14),inset 0 1px 0 rgba(255,255,255,.95)}button:active{transform:translateY(1px)}.save,.reset{grid-column:1/3}.save{font-weight:bold}.counter{margin-top:14px;text-align:center;font-size:18px;letter-spacing:3px;color:rgba(38,105,125,.88)}.hint{margin-top:10px;font-size:12px;line-height:1.35;text-align:center;color:rgba(35,95,115,.70)}.zoomLayer{position:fixed;inset:0;display:none;background:radial-gradient(circle at 50% 20%,rgba(255,255,255,.34),rgba(255,255,255,0) 38%),rgba(166,224,245,.88);backdrop-filter:blur(7px);z-index:100;overflow:hidden;cursor:grab}.zoomLayer.open{display:block}.zoomLayer.dragging{cursor:grabbing}#zoomImg{position:absolute;left:50%;top:50%;transform-origin:center center;user-select:none;-webkit-user-drag:none;max-width:none;max-height:none}.zoomTools{position:fixed;right:24px;top:20px;z-index:115;display:flex;align-items:center;gap:8px;padding:8px;border-radius:999px;background:rgba(255,255,255,.42);border:1px solid rgba(255,255,255,.62);box-shadow:0 8px 24px rgba(30,100,130,.18)}.zoomTools button{min-width:42px;padding:8px 10px;border-radius:999px;font-family:Arial,sans-serif}#zoomValue{min-width:54px;color:#1e6578;text-align:center;font-family:Arial,sans-serif;font-size:14px;font-weight:bold}.zoomClose{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:110;color:rgba(25,85,105,.82);background:rgba(255,255,255,.42);border:1px solid rgba(255,255,255,.55);border-radius:999px;padding:10px 16px;font-family:Arial,sans-serif;font-size:14px;pointer-events:none}.error{position:fixed;left:50%;bottom:3vh;transform:translateX(-50%);padding:10px 16px;border-radius:999px;background:rgba(30,105,135,.78);color:white;font-family:Arial,sans-serif;font-size:13px;display:none;z-index:20}@media(max-width:900px){.stage{inset:9vh 2vw 3vh 2vw;flex-direction:column;gap:14px}.frame{max-width:94vw;max-height:58vh;padding:16px}#mainImage{max-width:calc(94vw - 32px);max-height:calc(58vh - 32px)}.side-plate{width:min(94vw,520px);min-height:0;max-height:31vh;padding:12px}#caption{height:82px}}
</style>
</head>
<body>
<div class="title">ЗАЛ УТРЕННЕГО ЛЕТА</div>
<main class="stage"><section class="picture-zone"><div class="frame"><div class="artwrap"><img id="mainImage" alt="Работа 01"></div></div></section><aside class="side-plate"><textarea id="caption" placeholder="Название работы&#10;Автор"></textarea><div class="controls"><button id="prevBtn">← назад</button><button id="nextBtn">вперёд →</button><button class="save" id="saveBtn">Сохранить надпись</button><button class="reset" id="resetBtn">Сбросить надпись</button></div><div class="counter"><span id="now">01</span> / 52</div><div class="hint">Кнопки, стрелки ← → или колесо. Клик по картине — лупа от 25% до 300%.</div></aside></main>
<div class="zoomLayer" id="zoomLayer"><img id="zoomImg" alt=""><div class="zoomTools"><button id="zoomOutBtn" type="button">−</button><span id="zoomValue">25%</span><button id="zoomInBtn" type="button">+</button><button id="zoomHomeBtn" type="button">25%</button><button id="zoomFullBtn" type="button">100%</button><button id="zoomCloseBtn" type="button">закрыть</button></div><div class="zoomClose">колесо мыши — масштаб • тянуть картину — двигать • 25% — исходное • Esc — назад в зал</div></div><div class="error" id="errorBox"></div>
<script>
const TOTAL=52,FOLDER="MOON_3",STORAGE_PREFIX="morning_summer_gallery_caption_",EXTENSIONS=["jpg","JPG","jpeg","JPEG","png","PNG","webp","WEBP"];let index=1;const mainImage=document.getElementById("mainImage"),caption=document.getElementById("caption"),now=document.getElementById("now"),errorBox=document.getElementById("errorBox"),prevBtn=document.getElementById("prevBtn"),nextBtn=document.getElementById("nextBtn"),saveBtn=document.getElementById("saveBtn"),resetBtn=document.getElementById("resetBtn"),zoomLayer=document.getElementById("zoomLayer"),zoomImg=document.getElementById("zoomImg"),zoomOutBtn=document.getElementById("zoomOutBtn"),zoomInBtn=document.getElementById("zoomInBtn"),zoomHomeBtn=document.getElementById("zoomHomeBtn"),zoomFullBtn=document.getElementById("zoomFullBtn"),zoomCloseBtn=document.getElementById("zoomCloseBtn"),zoomValue=document.getElementById("zoomValue");function pad(n){return String(n).padStart(2,"0")}function imagePath(n,e){return FOLDER+"/"+pad(n)+"."+e}function showError(t){errorBox.textContent=t;errorBox.style.display="block";clearTimeout(showError.timer);showError.timer=setTimeout(function(){errorBox.style.display="none"},2400)}function loadCaption(){caption.value=localStorage.getItem(STORAGE_PREFIX+pad(index))||""}function saveCaption(){localStorage.setItem(STORAGE_PREFIX+pad(index),caption.value);showError("Надпись сохранена для работы "+pad(index))}function resetCaption(){caption.value="";localStorage.removeItem(STORAGE_PREFIX+pad(index));showError("Надпись сброшена для работы "+pad(index))}function tryLoadImage(n,ei){ei=ei||0;if(ei>=EXTENSIONS.length){showError("Не найден файл: "+FOLDER+"/"+pad(n)+".jpg / .png / .webp");return}const p=imagePath(n,EXTENSIONS[ei]),probe=new Image;probe.onload=function(){mainImage.src=p;mainImage.alt="Работа "+pad(n)};probe.onerror=function(){tryLoadImage(n,ei+1)};probe.src=p}function show(n){if(n<1)n=TOTAL;if(n>TOTAL)n=1;index=n;now.textContent=pad(index);loadCaption();tryLoadImage(index,0)}function next(){show(index+1)}function prev(){show(index-1)}prevBtn.onclick=prev;nextBtn.onclick=next;saveBtn.onclick=saveCaption;resetBtn.onclick=resetCaption;/* NEX V4 AUTOSAVE */caption.addEventListener("input",saveCaption);window.addEventListener("beforeunload",saveCaption);document.addEventListener("keydown",function(e){if(zoomLayer.classList.contains("open")){if(e.key==="Escape")closeZoom();return}if(e.key==="ArrowRight")next();if(e.key==="ArrowLeft")prev()});document.addEventListener("wheel",function(e){if(zoomLayer.classList.contains("open"))return;if(Math.abs(e.deltaY)<8)return;if(e.deltaY>0)next();else prev()},{passive:true});
let dragging=false,startX=0,startY=0,imgX=0,imgY=0,zoomScale=.25;const ZOOM_MIN=.25,ZOOM_MAX=3,ZOOM_STEP=.10;function clampZoom(v){return Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,v))}function updateZoomValue(){zoomValue.textContent=Math.round(zoomScale*100)+"%"}function setZoomTransform(){zoomImg.style.transform="translate(-50%, -50%) translate("+imgX+"px,"+imgY+"px) scale("+zoomScale+")";updateZoomValue()}function setZoom(v){zoomScale=clampZoom(v);setZoomTransform()}function changeZoom(d){setZoom(zoomScale+d)}function homeZoom(){zoomScale=.25;imgX=0;imgY=0;setZoomTransform()}function fullZoom(){zoomScale=1;imgX=0;imgY=0;setZoomTransform()}function openZoom(){zoomImg.src=mainImage.src;homeZoom();zoomLayer.classList.add("open")}function closeZoom(){zoomLayer.classList.remove("open");dragging=false;zoomLayer.classList.remove("dragging");homeZoom()}mainImage.onclick=openZoom;zoomInBtn.onclick=function(e){e.stopPropagation();changeZoom(ZOOM_STEP)};zoomOutBtn.onclick=function(e){e.stopPropagation();changeZoom(-ZOOM_STEP)};zoomHomeBtn.onclick=function(e){e.stopPropagation();homeZoom()};zoomFullBtn.onclick=function(e){e.stopPropagation();fullZoom()};zoomCloseBtn.onclick=function(e){e.stopPropagation();closeZoom()};zoomLayer.addEventListener("wheel",function(e){e.preventDefault();if(e.deltaY<0)changeZoom(ZOOM_STEP);else changeZoom(-ZOOM_STEP)},{passive:false});zoomLayer.addEventListener("mousedown",function(e){if(e.target.closest(".zoomTools"))return;if(e.target!==zoomImg){closeZoom();return}dragging=true;zoomLayer.classList.add("dragging");startX=e.clientX-imgX;startY=e.clientY-imgY});window.addEventListener("mousemove",function(e){if(!dragging)return;imgX=e.clientX-startX;imgY=e.clientY-startY;setZoomTransform()});window.addEventListener("mouseup",function(){dragging=false;zoomLayer.classList.remove("dragging")});zoomLayer.addEventListener("touchstart",function(e){if(e.target.closest(".zoomTools"))return;if(e.target!==zoomImg){closeZoom();return}dragging=true;const t=e.touches[0];startX=t.clientX-imgX;startY=t.clientY-imgY},{passive:true});zoomLayer.addEventListener("touchmove",function(e){if(!dragging)return;const t=e.touches[0];imgX=t.clientX-startX;imgY=t.clientY-startY;setZoomTransform()},{passive:true});zoomLayer.addEventListener("touchend",function(){dragging=false},{passive:true});show(1);
</script>
</body>
</html>
