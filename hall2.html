<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЗАЛ СОЛНЕЧНЫХ БЛИКОВ</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* ФОН */
.scene {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("/logovo/king_steppe_443x31.jpg") center/cover no-repeat;
}

/* ЗАТЕМНЕНИЕ */
.fade {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 20%, black 90%);
}

/* НАЗВАНИЕ */
.title {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    font-size: 48px;
    letter-spacing: 6px;
    color: rgba(255, 220, 120, 0.9);
    opacity: 0;
    animation: fadeIn 3s forwards;
}

/* АКТИВНОЕ ПЯТНО */
.portal {
    position: absolute;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,200,100,0.9) 0%, rgba(255,100,0,0.2) 70%, transparent 100%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    animation: pulse 2s infinite;
}

/* АНИМАЦИИ */
@keyframes fadeIn {
    to { opacity: 1; }
}

@keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.2); }
    100% { transform: translate(-50%, -50%) scale(1); }
}
</style>
</head>

<body>

<div class="scene"></div>
<div class="fade"></div>

<div class="title">ЗАЛ СОЛНЕЧНЫХ БЛИКОВ</div>

<div class="portal" onclick="goGallery()"></div>

<script>
function goGallery() {
    window.location.href = "gallery2.html";
}
</script>

</body>
</html>
