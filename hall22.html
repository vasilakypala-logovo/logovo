<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПУТЬ В КВАДРАТНЫЙ ТУМАН</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
}

.scene {
    position: absolute;
    inset: 0;
    background:
        linear-gradient(to right,
            rgba(0,0,0,0.94) 0%,
            rgba(0,0,0,0.42) 12%,
            rgba(0,0,0,0.06) 24%,
            rgba(0,0,0,0.00) 50%,
            rgba(0,0,0,0.06) 76%,
            rgba(0,0,0,0.42) 88%,
            rgba(0,0,0,0.94) 100%
        ),
        radial-gradient(circle at center,
            rgba(255,255,255,0.03) 0%,
            rgba(120,140,200,0.04) 30%,
            rgba(0,0,0,0.18) 100%
        ),
        url("square_fog_path.jpg") center center / cover no-repeat;
}

/* Общая дымка */
.fog-layer-1,
.fog-layer-2,
.fog-layer-3 {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
}

.fog-layer-1 {
    background:
        radial-gradient(circle at 18% 42%, rgba(220,230,255,0.14) 0%, rgba(220,230,255,0.00) 28%),
        radial-gradient(circle at 74% 35%, rgba(210,220,255,0.12) 0%, rgba(210,220,255,0.00) 26%),
        radial-gradient(circle at 48% 68%, rgba(245,245,255,0.10) 0%, rgba(245,245,255,0.00) 34%);
    filter: blur(14px);
    animation: fogDrift1 18s ease-in-out infinite alternate;
}

.fog-layer-2 {
    background:
        linear-gradient(to right,
            rgba(255,255,255,0.00) 0%,
            rgba(210,220,255,0.06) 18%,
            rgba(255,255,255,0.00) 36%,
            rgba(210,220,255,0.07) 55%,
            rgba(255,255,255,0.00) 74%,
            rgba(210,220,255,0.05) 100%
        );
    filter: blur(26px);
    animation: fogDrift2 24s ease-in-out infinite alternate;
}

.fog-layer-3 {
    background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.00) 60%);
    filter: blur(40px);
    opacity: 0.8;
}

/* Звезды */
.stars {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255,245,190,0.9);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(255,240,170,0.8);
    animation: twinkle 3.2s ease-in-out infinite;
}

/* Название */
.title {
    position: absolute;
    top: 7%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    text-align: center;
    white-space: nowrap;
    font-size: clamp(22px, 3.4vw, 46px);
    letter-spacing: 5px;
    color: rgba(210, 220, 255, 0.92);
    text-shadow:
        0 0 10px rgba(170,190,255,0.20),
        0 0 26px rgba(255,255,255,0.08),
        0 2px 10px rgba(0,0,0,0.75);
    opacity: 0;
    animation: titleFade 3.2s ease forwards;
    pointer-events: none;
}

/* Кликабельная дверца в шаре */
.portal-door {
    position: absolute;
    left: 63.7%;
    top: 90.2%;
    width: 3.1%;
    height: 6.6%;
    min-width: 26px;
    min-height: 42px;
    transform: translate(-50%, -50%);
    z-index: 6;
    cursor: pointer;
    border-radius: 4px;
    background:
        linear-gradient(to bottom,
            rgba(255,245,170,0.95) 0%,
            rgba(255,232,110,0.92) 45%,
            rgba(255,210,70,0.78) 100%
        );
    box-shadow:
        0 0 10px rgba(255,245,180,0.75),
        0 0 22px rgba(255,225,120,0.55),
        0 0 40px rgba(255,235,150,0.28);
    animation: doorPulse 2.8s ease-in-out infinite;
}

/* мягкий ореол дверцы */
.portal-door::before {
    content: "";
    position: absolute;
    inset: -8px;
    border-radius: 8px;
    background:
        radial-gradient(circle,
            rgba(255,250,210,0.34) 0%,
            rgba(255,230,140,0.18) 36%,
            rgba(255,230,140,0.00) 72%);
    filter: blur(6px);
    pointer-events: none;
}

/* тонкий внутренний блеск */
.portal-door::after {
    content: "";
    position: absolute;
    left: 18%;
    top: 8%;
    width: 24%;
    height: 74%;
    border-radius: 3px;
    background: linear-gradient(to bottom,
        rgba(255,255,255,0.65),
        rgba(255,255,255,0.08)
    );
    opacity: 0.7;
    pointer-events: none;
}

@keyframes titleFade {
    from {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
}

@keyframes doorPulse {
    0% {
        transform: translate(-50%, -50%) scale(0.96);
        opacity: 0.82;
        box-shadow:
            0 0 8px rgba(255,245,180,0.70),
            0 0 18px rgba(255,225,120,0.45),
            0 0 28px rgba(255,235,150,0.20);
    }
    50% {
        transform: translate(-50%, -50%) scale(1.07);
        opacity: 1;
        box-shadow:
            0 0 14px rgba(255,250,200,0.95),
            0 0 28px rgba(255,230,130,0.75),
            0 0 52px rgba(255,235,150,0.34);
    }
    100% {
        transform: translate(-50%, -50%) scale(0.96);
        opacity: 0.82;
        box-shadow:
            0 0 8px rgba(255,245,180,0.70),
            0 0 18px rgba(255,225,120,0.45),
            0 0 28px rgba(255,235,150,0.20);
    }
}

@keyframes fogDrift1 {
    0% { transform: translateX(-1.2%) translateY(0.4%); opacity: 0.85; }
    100% { transform: translateX(1.5%) translateY(-0.6%); opacity: 1; }
}

@keyframes fogDrift2 {
    0% { transform: translateX(1.5%) translateY(-0.4%); opacity: 0.55; }
    100% { transform: translateX(-1.2%) translateY(0.5%); opacity: 0.85; }
}

@keyframes twinkle {
    0%, 100% { opacity: 0.35; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
}
</style>
</head>
<body>

<div class="scene"></div>

<div class="fog-layer-1"></div>
<div class="fog-layer-2"></div>
<div class="fog-layer-3"></div>

<div class="stars">
    <div class="star" style="left:8%; top:10%; animation-delay:0.2s;"></div>
    <div class="star" style="left:14%; top:17%; animation-delay:1.4s;"></div>
    <div class="star" style="left:21%; top:9%; animation-delay:2.1s;"></div>
    <div class="star" style="left:28%; top:14%; animation-delay:0.8s;"></div>
    <div class="star" style="left:36%; top:7%; animation-delay:1.9s;"></div>
    <div class="star" style="left:43%; top:12%; animation-delay:0.5s;"></div>
    <div class="star" style="left:51%; top:8%; animation-delay:2.7s;"></div>
    <div class="star" style="left:58%; top:15%; animation-delay:1.1s;"></div>
    <div class="star" style="left:64%; top:9%; animation-delay:2.4s;"></div>
    <div class="star" style="left:71%; top:13%; animation-delay:0.9s;"></div>
    <div class="star" style="left:78%; top:7%; animation-delay:1.6s;"></div>
    <div class="star" style="left:84%; top:12%; animation-delay:2.9s;"></div>
    <div class="star" style="left:91%; top:9%; animation-delay:0.4s;"></div>
</div>

<div class="title">ПУТЬ В КВАДРАТНЫЙ ТУМАН</div>

<div class="portal-door" onclick="goGallery()" title="Войти в галерею"></div>

<script>
function goGallery() {
    window.location.href = "gallery4.html";
}
</script>

</body>
</html>
