<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЗАЛ УТРЕННЕГО ЛЕТА</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
}

.scene {
    position: absolute;
    inset: 0;
    background:
        linear-gradient(to right,
            rgba(0,0,0,0.92) 0%,
            rgba(0,0,0,0.35) 10%,
            rgba(0,0,0,0.00) 22%,
            rgba(0,0,0,0.00) 78%,
            rgba(0,0,0,0.35) 90%,
            rgba(0,0,0,0.92) 100%
        ),
        radial-gradient(circle at center,
            rgba(255,255,255,0.04) 0%,
            rgba(0,0,0,0.00) 45%,
            rgba(0,0,0,0.18) 100%
        ),
        url("УТРЕННЕЕ_ЛЕТО.jpg") center center / cover no-repeat;
}

/* Очень мягкое общее затемнение, чтобы надпись читалась */
.atmosphere {
    position: absolute;
    inset: 0;
    background:
        linear-gradient(to bottom,
            rgba(0,0,0,0.18) 0%,
            rgba(0,0,0,0.04) 28%,
            rgba(0,0,0,0.02) 60%,
            rgba(0,0,0,0.25) 100%
        );
    pointer-events: none;
}

.title {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    white-space: nowrap;
    font-size: clamp(26px, 4vw, 54px);
    letter-spacing: 6px;
    color: rgba(220, 255, 190, 0.92);
    text-shadow:
        0 0 10px rgba(180, 220, 120, 0.18),
        0 0 24px rgba(255, 255, 255, 0.08),
        0 2px 8px rgba(0,0,0,0.7);
    opacity: 0;
    animation: titleFade 3s ease forwards;
    z-index: 3;
    pointer-events: none;
}

/* Активное пятно — мягкое, как свет сквозь траву */
.portal {
    position: absolute;
    left: 50%;
    top: 56%;
    width: 170px;
    height: 170px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    cursor: pointer;
    z-index: 4;
    background:
        radial-gradient(circle,
            rgba(255,255,210,0.34) 0%,
            rgba(220,255,170,0.22) 24%,
            rgba(180,220,120,0.12) 44%,
            rgba(255,255,255,0.05) 60%,
            rgba(255,255,255,0.00) 76%
        );
    box-shadow:
        0 0 20px rgba(220,255,180,0.18),
        0 0 55px rgba(255,240,180,0.10),
        inset 0 0 18px rgba(255,255,220,0.08);
    animation: breathe 3.4s ease-in-out infinite;
}

/* Чтобы пятно было ощутимым, но не грубым */
.portal::before {
    content: "";
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    background:
        radial-gradient(circle,
            rgba(255,255,220,0.08) 0%,
            rgba(220,255,180,0.05) 35%,
            rgba(255,255,255,0.00) 72%
        );
    filter: blur(8px);
    pointer-events: none;
}

@keyframes titleFade {
    from {
        opacity: 0;
        transform: translateX(-50%) translateY(-12px);
    }
    to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
}

@keyframes breathe {
    0% {
        transform: translate(-50%, -50%) scale(0.96);
        opacity: 0.82;
    }
    50% {
        transform: translate(-50%, -50%) scale(1.05);
        opacity: 1;
    }
    100% {
        transform: translate(-50%, -50%) scale(0.96);
        opacity: 0.82;
    }
}
</style>
</head>
<body>

<div class="scene"></div>
<div class="atmosphere"></div>

<div class="title">ЗАЛ УТРЕННЕГО ЛЕТА</div>

<div class="portal" onclick="goGallery()" title="Войти в галерею"></div>

<script>
function goGallery() {
    window.location.href = "gallery3.html";
}
</script>

</body>
</html>
