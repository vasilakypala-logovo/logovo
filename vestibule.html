<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вестибюль</title>

<style>
@font-face {
    font-family: 'Font4174';
    src: url('fonts/4174-font.ttf');
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Georgia, serif;
    color: #d8deea;
}

body {
    position: relative;
    animation: fadeInScene 2s ease;
}

.hall {
    position: relative;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at center, rgba(30,30,40,0.95) 0%, rgba(0,0,0,1) 75%);
}

.mist {
    position: absolute;
    inset: -20%;
    background:
        radial-gradient(circle at 30% 40%, rgba(180,200,255,0.08), transparent 35%),
        radial-gradient(circle at 70% 60%, rgba(220,220,255,0.06), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04), transparent 45%);
    animation: mistMove 20s ease-in-out infinite;
    pointer-events: none;
}

/* Белое пятно */
.bust {
    position: absolute;
    top: 52%;
    left: 50%;
    width: 180px;
    height: 260px;
    transform: translate(-50%, -50%);
    background:
        radial-gradient(ellipse at center,
            rgba(220,230,255,0.16) 0%,
            rgba(180,190,220,0.08) 35%,
            rgba(0,0,0,0) 75%);
    filter: blur(18px);
    opacity: 0.9;
    pointer-events: none;
}

/* Кликабельная зона поверх пятна */
.portal {
    position: absolute;
    top: 52%;
    left: 50%;
    width: 220px;
    height: 300px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 3;
}

/* Вопросительный знак */
.question-mark {
    position: absolute;
    top: calc(52% + 168px);
    left: 50%;
    transform: translateX(-50%);
    font-family: Arial, sans-serif;
    font-size: 28px;
    font-weight: bold;
    color: rgba(210,220,235,0.75);
    text-shadow: 0 0 12px rgba(140,170,210,0.25);
    z-index: 4;
    pointer-events: none;
    user-select: none;
}

.title {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    font-family: Arial, sans-serif;
    font-weight: bold;
    font-size: 26px;
    letter-spacing: 6px;
    color: rgba(220,225,235,0.7);
}

.quote {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 1100px;
    text-align: center;

    font-family: 'Font4174', cursive;
    font-size: 52px;
    line-height: 1.35;

    background: linear-gradient(
        90deg,
        #7faea3,
        #8fbfd0,
        #a8b3b8
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow: 0 0 14px rgba(120,180,190,0.25);

    min-height: 140px;
}

.back {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
    z-index: 5;
}

.back a {
    color: #cfd8f0;
    text-decoration: none;
    font-size: 18px;
    border: 1px solid rgba(200,216,255,0.18);
    padding: 10px 18px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    transition: 0.3s ease;
}

.back a:hover {
    background: rgba(200,216,255,0.08);
}

@keyframes mistMove {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(-20px, 10px) scale(1.04); }
    50%  { transform: translate(15px, -12px) scale(1.07); }
    75%  { transform: translate(-10px, 8px) scale(1.03); }
    100% { transform: translate(0, 0) scale(1); }
}

@keyframes fadeInScene {
    from {
        opacity: 0;
        filter: blur(8px);
    }
    to {
        opacity: 1;
        filter: blur(0);
    }
}
</style>
</head>

<body>
<div class="hall">
    <div class="mist"></div>

    <div class="bust"></div>
    <div class="portal" onclick="enterHall()"></div>
    <div class="question-mark">?</div>

    <div class="title">ЛОГОВО ИСКУССТВЕННОГО ИНТЕЛЛЕКТА</div>
    <div class="quote" id="quote"></div>

    <div class="back">
        <a href="index.html">Вернуться</a>
    </div>
</div>

<script>
const text = "Все начинается не с картины — Оно начинается с момента, когда ты решил войти";
let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("quote").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 35);
    }
}

function enterHall() {
    window.location.href = "logovo.html";
}

window.onload = typeWriter;
</script>
</body>
</html>
